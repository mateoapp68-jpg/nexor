<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Nexor WhatsApp Extractor</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="layout">

    <!-- SIDEBAR — Nexor control UI -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="logo">N</div>
        <div>
          <div class="title">Nexor Extractor</div>
          <div class="subtitle" id="statusText">Cargando WhatsApp Web...</div>
        </div>
      </div>

      <!-- STATUS -->
      <div id="statusBadge" class="status status-loading">
        <span class="dot"></span>
        <span id="statusLabel">Esperando WhatsApp</span>
      </div>

      <!-- VIEW: Main menu -->
      <div id="viewMain" class="view active">
        <p class="section-title">¿Qué querés exportar?</p>

        <button id="btnGroups" class="big-btn" disabled>
          <div class="big-btn-icon">👥</div>
          <div class="big-btn-text">
            <span class="big-btn-title">Grupos</span>
            <span class="big-btn-desc">Elegí los grupos y exportá miembros</span>
          </div>
        </button>

        <button id="btnLabels" class="big-btn" disabled>
          <div class="big-btn-icon">🏷️</div>
          <div class="big-btn-text">
            <span class="big-btn-title">Etiquetas</span>
            <span class="big-btn-desc">Contactos por etiqueta (Business)</span>
          </div>
        </button>

        <button id="btnAllChats" class="big-btn" disabled>
          <div class="big-btn-icon">💬</div>
          <div class="big-btn-text">
            <span class="big-btn-title">Todos los chats</span>
            <span class="big-btn-desc">Lista completa de contactos</span>
          </div>
        </button>

        <div class="footer-note">
          Los datos se extraen directamente de WhatsApp Web con los números reales.
          Se exportan a Excel (CSV).
        </div>
      </div>

      <!-- VIEW: Selection (groups or labels) -->
      <div id="viewSelect" class="view">
        <button id="backBtn" class="back-btn">← Volver</button>

        <p class="section-title" id="selectTitle">Seleccioná elementos</p>

        <div id="loadingList" class="loading">
          <div class="spinner"></div>
          <span>Cargando...</span>
        </div>

        <div id="listContent" style="display:none">
          <div class="list-toolbar">
            <input type="text" id="searchInput" class="search-input" placeholder="Buscar..." />
            <button id="selectAllBtn" class="link-btn">Seleccionar todos</button>
          </div>

          <div id="itemsList" class="items-list"></div>

          <div class="options-box">
            <div class="options-title">¿Qué exportar?</div>
            <div class="radio-group">
              <button class="radio active" data-mode="phone">Solo teléfono</button>
              <button class="radio" data-mode="phone_name">Teléfono + Nombre</button>
            </div>
          </div>

          <button id="btnExport" class="primary-btn" disabled>
            Exportar seleccionados
          </button>
        </div>
      </div>

      <!-- VIEW: All chats options -->
      <div id="viewAll" class="view">
        <button id="backBtnAll" class="back-btn">← Volver</button>

        <p class="section-title">Exportar todos los chats</p>

        <div class="options-box">
          <div class="options-title">¿Qué exportar?</div>
          <div class="radio-group">
            <button class="radio active" data-mode-all="phone">Solo teléfono</button>
            <button class="radio" data-mode-all="phone_name">Teléfono + Nombre</button>
          </div>
        </div>

        <button id="btnExportAll" class="primary-btn">Exportar ahora</button>
      </div>

      <!-- LOG -->
      <div id="log" class="log"></div>
    </aside>

    <!-- MAIN — WhatsApp Web webview -->
    <main class="main">
      <webview
        id="wa"
        src="https://web.whatsapp.com/"
        partition="persist:whatsapp"
        allowpopups
        style="width:100%;height:100%"
      ></webview>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
